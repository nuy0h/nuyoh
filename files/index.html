<title>n u y o h</title>
<script>
(function(){
  const full='n u y o h';
  const pause=2200;
  const typeSpeed=120;
  const eraseSpeed=60;
  let i=0, erasing=false;
  function tick(){
    if(!erasing){
      document.title=full.slice(0,i);
      i++;
      if(i>full.length){erasing=false;setTimeout(()=>{erasing=true;tick();},pause);return;}
    } else {
      document.title=full.slice(0,i);
      i--;
      if(i<0){erasing=false;i=0;setTimeout(tick,pause);return;}
    }
    setTimeout(tick, erasing ? eraseSpeed : typeSpeed);
  }
  setTimeout(tick, 800);
})();
</script>
